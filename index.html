<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AERIA | Premium Gemini Assistant</title>
    <meta name="description" content="Experience the future with AERIA, a premium AI chatbot powered by Google Gemini.">

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Inter:wght@400;500&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="chat-container">
        <!-- Main Workspace -->
        <main class="chat-main">
            <header class="chat-header">
                <div class="header-left">
                    <div class="header-logo">AERIA</div>
                </div>
                <div class="header-actions">
                    <div class="user-avatar"
                        style="background: var(--accent-gradient); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: white;">
                        You</div>
                </div>
            </header>

            <div class="message-feed" id="message-feed">
                <!-- Welcome Message -->
                <div class="message-wrapper animate">
                    <div class="message ai">
                        <div class="message-avatar">A</div>
                        <div class="message-content">
                            <div class="message-bubble">
                                <p>Hello. I am AERIA, How can I
                                    facilitate your productivity today?</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>


            <footer class="chat-input-area">
                <form id="chat-form" class="input-container">
                    <textarea id="user-input" placeholder="Ask AERIA anything..." rows="1"></textarea>
                    <button type="submit" class="send-btn" id="send-btn" disabled>
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                        </svg>
                    </button>
                </form>
                <br>
                <p>AERIA may provide inaccurate info. Verify important details.</p>
            </footer>
        </main>
    </div>


    <script src="script.js"></script>
</body>

</html>
